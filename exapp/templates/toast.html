{% if messages %}
<div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3">
    {% for message in messages %}
    <div class="toast-item transform transition-all duration-300 ease-in-out translate-x-0 flex items-center p-4 w-full max-w-xs rounded-xl shadow-lg 
        {% if message.tags == 'success' %} bg-green-600 text-white 
        {% elif message.tags == 'error' %} bg-red-600 text-white 
        {% elif message.tags == 'warning' %} bg-amber-500 text-white 
        {% else %} bg-blue-600 text-white {% endif %}">
        
        <div class="ms-3 text-sm font-bold">{{ message }}</div>
        
        <button type="button" onclick="this.parentElement.remove()" class="ms-auto -mx-1.5 -my-1.5 p-1.5 inline-flex items-center justify-center h-8 w-8 text-white hover:bg-black/10 rounded-lg">
            <span class="sr-only">Close</span>
            <svg class="w-3 h-3" fill="none" viewBox="0 0 14 14">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>

<script>
    // Automatically hide toasts after 4 seconds
    setTimeout(() => {
        const toasts = document.querySelectorAll('.toast-item');
        toasts.forEach(toast => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100%)';
            setTimeout(() => toast.remove(), 300);
        });
    }, 4000);
</script>
{% endif %}
